<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jenna MacNeill — Graphic Designer</title>
    <meta
      name="description"
      content="Graphic design portfolio by Jenna MacNeill."
    />
    <link rel="icon" type="image/webp" href="images/jm-icon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="index.html" class="site-logo" aria-label="Home">
          <img src="images/jm-icon.webp" alt="JM logo" />
        </a>
        <nav class="site-nav">
          <a href="index.html" class="active">Graphic Design</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="portfolio-grid">
        <a href="portfolio/travel-pass.html" class="portfolio-card">
          <img
            src="images/project-images/travel-pass/TravelPass_cover.webp"
            alt="TravelPass project cover"
            class="portfolio-card__image"
          />
          <div class="portfolio-card__overlay">
            <span class="portfolio-card__title">TravelPass</span>
          </div>
        </a>

        <a
          href="portfolio/gaf-email-templates.html"
          class="portfolio-card"
        >
          <img
            src="images/project-images/gaf-email-templates/GAFTemplate_cover.webp"
            alt="GAF Email Templates project cover"
            class="portfolio-card__image"
          />
          <div class="portfolio-card__overlay">
            <span class="portfolio-card__title">GAF Email Templates</span>
          </div>
        </a>

        <a href="portfolio/rutgers-it.html" class="portfolio-card">
          <img
            src="images/project-images/rutgers-it/rutgers_it_cover.webp"
            alt="Rutgers Information Technology project cover"
            class="portfolio-card__image"
          />
          <div class="portfolio-card__overlay">
            <span class="portfolio-card__title">Rutgers Information Technology</span>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
