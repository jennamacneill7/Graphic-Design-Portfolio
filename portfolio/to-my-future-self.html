<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To My Future Self — Jenna MacNeill</title>
    <meta
      name="description"
      content="To My Future Self — a project from Jenna MacNeill's graphic design portfolio."
    />
    <link rel="icon" type="image/webp" href="../images/jm-icon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a href="../index.html" class="site-logo" aria-label="Home">
          <img src="../images/jm-icon.webp" alt="JM logo" />
        </a>
        <nav class="site-nav">
          <a href="../index.html" class="active">Graphic Design</a>
          <a href="../contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="project-header">
        <div>
          <a href="../index.html" class="project-back">&larr; Back</a>
          <h1>To My Future Self</h1>
        </div>
        <p class="project-header__description">
          "To My Future Self" is an interactive platform where users can compose postcards addressed to their future selves, sharing valuable advice and strategies on enhancing their mental well-being amidst the pandemic.
        </p>
      </section>

      <section class="project-gallery">
        <div class="project-gallery__group">
          <div class="project-gallery__images project-gallery__images--single">
            <img
              src="../images/project-images/future-self/futureself_1.webp"
              alt="To My Future Self screen 1"
            />
          </div>
        </div>
        <div class="project-gallery__group">
          <div class="project-gallery__images project-gallery__images--single">
            <img
              src="../images/project-images/future-self/futureself_2.webp"
              alt="To My Future Self screen 2"
            />
          </div>
        </div>
        <div class="project-gallery__group">
          <div class="project-gallery__images project-gallery__images--single">
            <img
              src="../images/project-images/future-self/futureself_3.webp"
              alt="To My Future Self screen 3"
            />
          </div>
        </div>

        <div class="project-cta">
          <a
            href="https://jennamacneill.github.io/tomyfutureself/"
            target="_blank"
            rel="noopener"
            class="btn btn--primary"
          >
            Write a Postcard
          </a>
        </div>
      </section>
    </main>

  </body>
</html>
